<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C4CFF" />
    <title>Webxtant — Creative Digital Agency</title>
    <!-- Anti-flash: apply saved theme before React renders -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('webxtant-theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
    <style>
      /* Prevent white flash on dark mode */
      html[data-theme="dark"] body { background-color: #0a0a0a; }
      html[data-theme="light"] body { background-color: #f5f5f5; }
      /* Hide cursor until JS loads on desktop */
      @media (pointer: fine) { * { cursor: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
